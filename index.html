<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>СВП | МОБИЛЬНЫЙ ЧАТ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Courier New', monospace;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .chat {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            height: 100dvh;
            background: #000000;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(255, 94, 0, 0.3);
            position: relative;
        }

        /* Вкладки (Tabs) */
        .tabs {
            display: flex;
            background: #050505;
            border-bottom: 1px solid #ff5e00;
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1;
            background: #0a0a0a;
            border: none;
            color: #ffaa55;
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 0;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: #ff5e00;
            border-bottom: 2px solid #ff5e00;
            background: #0f0f0f;
            text-shadow: 0 0 4px #ff5e00;
        }
        .tab-btn:active {
            background: #1f1f1f;
        }

        /* Контент вкладок */
        .tab-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-pane {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-pane.active-pane {
            display: flex;
        }

        /* Сообщения (Чат) */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px;
            background: #0b0b0b;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .messages::-webkit-scrollbar {
            width: 3px;
        }
        .messages::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #ff5e00;
            border-radius: 10px;
        }

        .message {
            background: #111111;
            padding: 8px 12px;
            border-radius: 18px;
            margin-bottom: 10px;
            max-width: 85%;
            border: 1px solid #2a2a2a;
            position: relative;
            word-wrap: break-word;
        }

        .my-message {
            background: #1f0a00;
            margin-left: auto;
            border: 1px solid #ff5e00;
            box-shadow: 0 0 6px rgba(255, 94, 0, 0.3);
        }

        .sender {
            font-size: 10px;
            font-weight: bold;
            color: #ff8c00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .sender-name {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ff6a4b;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
            min-width: 36px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .delete-btn:active {
            opacity: 0.7;
            transform: scale(0.95);
        }
        .text {
            font-size: 14px;
            margin: 4px 0;
            color: #e0e0e0;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .time {
            font-size: 8px;
            color: #aa6f3c;
            text-align: right;
            font-family: monospace;
            margin-top: 4px;
        }
        /* Блок реакций под сообщением */
        .reactions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            border-top: 1px solid #2a2a2a;
            padding-top: 5px;
            font-size: 12px;
        }
        .like-btn {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #ffaa66;
            transition: 0.1s;
            min-width: 44px;
            justify-content: center;
        }
        .like-btn:active {
            transform: scale(0.9);
        }
        .like-btn.liked {
            color: #ff3366;
            text-shadow: 0 0 3px #ff3366;
        }
        .like-count {
            font-size: 11px;
            font-weight: bold;
            color: #ffaa66;
        }

        /* Панель эмодзи */
        .emoji-panel {
            background: #0f0f0f;
            border-top: 1px solid #ff5e00;
            padding: 0 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            flex-shrink: 0;
        }
        .emoji-panel.open {
            max-height: 130px;
            padding: 10px 10px;
            overflow-y: auto;
        }
        .emoji-btn {
            background: #1a1a1a;
            border: 1px solid #ff5e00;
            color: #ffaa55;
            font-size: 22px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 35px;
            min-width: 42px;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .emoji-btn:active {
            background: #ff5e00;
            transform: scale(0.95);
        }

        /* Нижняя панель ввода */
        .input-area {
            background: #050505;
            padding: 8px 10px;
            border-top: 1px solid #ff5e00;
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .input-area input {
            background: #111;
            border: 1px solid #333;
            color: #ffb347;
            padding: 10px 12px;
            border-radius: 25px;
            outline: none;
            font-family: monospace;
            font-size: 14px;
            -webkit-appearance: none;
        }
        .input-area input:focus {
            border-color: #ff5e00;
            box-shadow: 0 0 6px #ff5e00;
        }
        #messageInput {
            flex: 1;
            font-size: 14px;
            min-width: 0;
        }
        .input-area button {
            background: #000;
            color: #ff8c00;
            border: 1.5px solid #ff5e00;
            border-radius: 35px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
            transition: 0.1s;
            min-width: 48px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
        }
        .input-area button:active {
            background: #ff5e00;
            color: #000;
            transform: scale(0.96);
        }
        #sendBtn {
            background: #1a0a00;
        }
        .emoji-toggle {
            background: #1a1a1a;
            font-size: 20px;
            padding: 0 12px;
        }
        .status {
            background: #0f0f0f;
            color: #ffaa55;
            padding: 4px;
            text-align: center;
            font-size: 9px;
            font-family: monospace;
            border-bottom: 1px dashed #ff5e00;
            flex-shrink: 0;
        }
        .error {
            background: #1a0000;
            color: #ff6a4b;
            padding: 8px;
            text-align: center;
            font-size: 10px;
            border-top: 1px solid #ff3c00;
            font-family: monospace;
            flex-shrink: 0;
        }
        .deleted-message {
            font-style: italic;
            color: #aa6f3c;
            text-align: center;
            font-size: 11px;
        }

        /* ========= ПРОФИЛЬ (вкладка) ========= */
        .profile-pane {
            padding: 24px 20px;
            background: #0b0b0b;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .profile-card {
            background: #111;
            border: 1px solid #ff5e00;
            border-radius: 32px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 0 12px rgba(255,94,0,0.2);
        }
        .profile-field {
            margin: 16px 0;
            text-align: left;
        }
        .profile-field label {
            color: #ffaa66;
            font-size: 12px;
            font-family: monospace;
            display: block;
            margin-bottom: 6px;
        }
        .profile-field input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #ff5e00;
            color: #ffb347;
            padding: 12px 14px;
            border-radius: 28px;
            font-size: 16px;
            font-family: monospace;
            text-align: center;
        }
        .save-profile-btn {
            background: #1f0a00;
            border: 1.5px solid #ff5e00;
            color: #ff8c00;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            width: 100%;
            cursor: pointer;
        }
        .save-profile-btn:active {
            background: #ff5e00;
            color: black;
            transform: scale(0.97);
        }
        .profile-note {
            text-align: center;
            font-size: 10px;
            color: #aa6f3c;
            margin-top: 12px;
        }

        @media (max-width: 400px) {
            .input-area button {
                min-width: 44px;
                padding: 0 8px;
            }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
<div class="chat">
    <div class="header">
        <h3>СВП</h3>
    </div>
    
    <div class="status" id="status">🔌 инициализация...</div>
    
    <!-- Вкладки: Чат и Профиль -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="chat">💬 ЧАТ</button>
        <button class="tab-btn" data-tab="profile">👤 ПРОФИЛЬ</button>
    </div>

    <div class="tab-content">
        <!-- Панель ЧАТ -->
        <div class="tab-pane active-pane" id="chatPane">
            <div class="messages" id="messages"></div>
            
            <div class="emoji-panel" id="emojiPanel">
                <button class="emoji-btn">😀</button><button class="emoji-btn">😂</button><button class="emoji-btn">🔥</button>
                <button class="emoji-btn">❤️</button><button class="emoji-btn">👍</button><button class="emoji-btn">🎉</button>
                <button class="emoji-btn">😎</button><button class="emoji-btn">💀</button><button class="emoji-btn">✨</button>
                <button class="emoji-btn">🤣</button><button class="emoji-btn">😍</button><button class="emoji-btn">🥰</button>
                <button class="emoji-btn">😭</button><button class="emoji-btn">😱</button><button class="emoji-btn">🤖</button>
            </div>
            
            <div class="input-area">
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button id="emojiToggleBtn" class="emoji-toggle">😊</button>
                    <button id="sendBtn">➤</button>
                </div>
            </div>
        </div>
        
        <!-- Панель ПРОФИЛЬ -->
        <div class="tab-pane" id="profilePane">
            <div class="profile-pane">
                <div class="profile-card">
                    <div class="profile-field">
                        <label>✏️ ВАШ НИКНЕЙМ</label>
                        <input type="text" id="profileNameInput" maxlength="20" placeholder="NeoUser">
                    </div>
                    <button class="save-profile-btn" id="saveProfileBtn">💾 СОХРАНИТЬ ПРОФИЛЬ</button>
                    <div class="profile-note">✨ Имя отображается в чате. Вы можете удалять только свои сообщения.</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="error" id="error" style="display: none;"></div>
</div>

<script>
    // ========== ⚠️ ВСТАВЬТЕ ВАШИ ДАННЫЕ FIREBASE ЗДЕСЬ ==========
    const firebaseConfig = {
    apiKey: "AIzaSyBRtSfBYUd5PHRjwnmhb5Mrj67F7KOKr1M",
    authDomain: "noco-83ff7.firebaseapp.com",
    databaseURL: "https://noco-83ff7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "noco-83ff7",
    storageBucket: "noco-83ff7.firebasestorage.app",
    messagingSenderId: "383521536951",
    appId: "1:383521536951:web:9c1a4b90a021db80d00632",
    measurementId: "G-EYEVMCSGMP"
    };
    // ============================================================
    
    const isConfigEmpty = (firebaseConfig.apiKey === "ВАШ_API_KEY" || firebaseConfig.databaseURL.includes("ВАШ_ПРОЕКТ"));
    
    if (isConfigEmpty) {
        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = '⚠️ ОШИБКА: Firebase не настроен! Вставьте свои данные в firebaseConfig';
        document.getElementById('status').innerHTML = '❌ СБОЙ ПОДКЛЮЧЕНИЯ';
        throw new Error('Firebase конфиг отсутствует');
    }
    
    try {
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');
        
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        const emojiPanel = document.getElementById('emojiPanel');
        const emojiToggleBtn = document.getElementById('emojiToggleBtn');
        
        // Профильные элементы
        const profileNameInput = document.getElementById('profileNameInput');
        const saveProfileBtn = document.getElementById('saveProfileBtn');
        
        // ---- Система ника (localStorage) ----
        let currentNick = localStorage.getItem('svpChatName') || 'NeoUser';
        
        function updateProfileUI() {
            profileNameInput.value = currentNick;
        }
        
        // Сохранение профиля
        function saveProfile() {
            let newName = profileNameInput.value.trim();
            if (newName === "") newName = "NeoUser";
            if (newName.length > 20) newName = newName.slice(0,18)+"..";
            currentNick = newName;
            localStorage.setItem('svpChatName', currentNick);
            updateProfileUI();
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = '✅ Профиль обновлён! Новое имя: ' + currentNick;
            setTimeout(() => errorDiv.style.display = 'none', 2000);
            // Перезагрузка сообщений для корректного отображения "моих" сообщений по новому нику
            refreshMessagesForNewName();
        }
        
        saveProfileBtn.onclick = saveProfile;
        
        // Функция обновления сообщений после смены имени
        function refreshMessagesForNewName() {
            if (!messagesRef) return;
            messagesRef.off();
            messagesDiv.innerHTML = '';
            attachMessageListeners();
        }
        
        // Панель эмодзи
        let emojiPanelOpen = false;
        emojiToggleBtn.onclick = () => {
            emojiPanelOpen = !emojiPanelOpen;
            if (emojiPanelOpen) {
                emojiPanel.classList.add('open');
                emojiToggleBtn.style.background = '#ff5e00';
                emojiToggleBtn.style.color = '#000';
            } else {
                emojiPanel.classList.remove('open');
                emojiToggleBtn.style.background = '#1a1a1a';
                emojiToggleBtn.style.color = '#ffaa55';
            }
        };
        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.onclick = () => {
                messageInput.value += btn.textContent;
                messageInput.focus();
            };
        });
        
        // Статус соединения
        database.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                statusDiv.innerHTML = '🟢 ONLINE • СВП';
                statusDiv.style.background = '#0a1a05';
                errorDiv.style.display = 'none';
            } else {
                statusDiv.innerHTML = '🔴 OFFLINE • ПОТЕРЯН КОНТАКТ';
                statusDiv.style.background = '#1a0505';
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '⚠️ НЕТ ПОДКЛЮЧЕНИЯ К FIREBASE ⚠️';
            }
        });
        
        function getTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Функция удаления сообщения
        function deleteMessage(messageKey, messageSender) {
            const currentUser = currentNick;
            if (messageSender !== currentUser) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ НЕЛЬЗЯ УДАЛИТЬ ЧУЖОЕ СООБЩЕНИЕ ❌';
                setTimeout(() => errorDiv.style.display = 'none', 2000);
                return;
            }
            if (!confirm(`💀 УДАЛИТЬ СВОЁ СООБЩЕНИЕ? 💀`)) return;
            database.ref(`messages/${messageKey}`).remove().catch(err => {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `❌ Ошибка: ${err.message}`;
                setTimeout(() => errorDiv.style.display = 'none', 2500);
            });
        }
        
        // Лайкнуть сообщение (только 1 реакция от пользователя)
        function toggleLike(messageKey, currentLikeState) {
            const likeRef = database.ref(`messages/${messageKey}/likes`);
            const likedByRef = database.ref(`messages/${messageKey}/likedBy/${currentNick}`);
            if (!currentLikeState) {
                // добавить лайк
                likeRef.transaction((currentLikes) => {
                    return (currentLikes || 0) + 1;
                });
                likedByRef.set(true);
            } else {
                likeRef.transaction((currentLikes) => {
                    if (currentLikes && currentLikes > 0) return currentLikes - 1;
                    return 0;
                });
                likedByRef.remove();
            }
        }
        
        // Добавление сообщения в DOM с поддержкой лайков (без аватарок)
        function addMessage(sender, text, time, isMyMessage, messageKey, isDeleted = false, likeCount = 0, userLiked = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            if (isMyMessage) messageDiv.classList.add('my-message');
            messageDiv.setAttribute('data-key', messageKey);
            
            if (isDeleted) {
                messageDiv.innerHTML = `
                    <div class="sender">
                        <span class="sender-name">🗑️ ${escapeHtml(sender)}</span>
                    </div>
                    <div class="text deleted-message">[Сообщение удалено]</div>
                    <div class="time">${time}</div>
                `;
            } else {
                const deleteButtonHtml = isMyMessage ? 
                    `<button class="delete-btn" data-key="${messageKey}" data-sender="${escapeHtml(sender)}">🗑️</button>` : '';
                
                const likeActiveClass = userLiked ? 'liked' : '';
                const likeIcon = userLiked ? '❤️' : '🤍';
                
                messageDiv.innerHTML = `
                    <div class="sender">
                        <span class="sender-name">${escapeHtml(sender)}</span>
                        ${deleteButtonHtml}
                    </div>
                    <div class="text">${escapeHtml(text)}</div>
                    <div class="time">${time}</div>
                    <div class="reactions">
                        <button class="like-btn ${likeActiveClass}" data-key="${messageKey}">${likeIcon} <span class="like-count">${likeCount || 0}</span></button>
                    </div>
                `;
                
                const likeButton = messageDiv.querySelector('.like-btn');
                if (likeButton) {
                    likeButton.onclick = (e) => {
                        e.stopPropagation();
                        const newLikeState = !userLiked;
                        toggleLike(messageKey, userLiked);
                    };
                }
                
                if (isMyMessage) {
                    const delBtn = messageDiv.querySelector('.delete-btn');
                    if (delBtn) {
                        delBtn.onclick = (e) => {
                            e.stopPropagation();
                            deleteMessage(messageKey, sender);
                        };
                    }
                }
            }
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Обновление отображения лайков в реальном времени
        function updateLikeUI(messageKey, newLikeCount, userHasLiked) {
            const messageElement = document.querySelector(`.message[data-key="${messageKey}"]`);
            if (!messageElement) return;
            const likeBtn = messageElement.querySelector('.like-btn');
            if (likeBtn) {
                const likeSpan = likeBtn.querySelector('.like-count');
                if (likeSpan) likeSpan.textContent = newLikeCount || 0;
                if (userHasLiked) {
                    likeBtn.classList.add('liked');
                    likeBtn.innerHTML = `❤️ <span class="like-count">${newLikeCount || 0}</span>`;
                } else {
                    likeBtn.classList.remove('liked');
                    likeBtn.innerHTML = `🤍 <span class="like-count">${newLikeCount || 0}</span>`;
                }
            }
        }
        
        // Прослушивание лайков на каждое сообщение
        function attachMessageListeners() {
            messagesRef.limitToLast(50).on('child_added', (snapshot) => {
                const data = snapshot.val();
                const messageKey = snapshot.key;
                if (!data) return;
                const currentUser = currentNick;
                const isMy = (data.sender === currentUser);
                const likes = data.likes || 0;
                const likedByObj = data.likedBy || {};
                const userLiked = !!likedByObj[currentUser];
                addMessage(data.sender, data.text, data.time, isMy, messageKey, data.deleted === true, likes, userLiked);
            });
            
            messagesRef.on('child_changed', (snapshot) => {
                const data = snapshot.val();
                const messageKey = snapshot.key;
                if (!data) return;
                const currentUser = currentNick;
                const likes = data.likes || 0;
                const likedByObj = data.likedBy || {};
                const userLiked = !!likedByObj[currentUser];
                const isDeleted = data.deleted === true;
                
                const existingDiv = document.querySelector(`.message[data-key="${messageKey}"]`);
                if (existingDiv && !isDeleted) {
                    // обновляем только лайки
                    const likeBtn = existingDiv.querySelector('.like-btn');
                    if (likeBtn) {
                        const likeSpan = likeBtn.querySelector('.like-count');
                        if (likeSpan) likeSpan.textContent = likes;
                        if (userLiked) {
                            likeBtn.classList.add('liked');
                            likeBtn.innerHTML = `❤️ <span class="like-count">${likes}</span>`;
                        } else {
                            likeBtn.classList.remove('liked');
                            likeBtn.innerHTML = `🤍 <span class="like-count">${likes}</span>`;
                        }
                    }
                    // если текст поменялся (например, не удалено)
                    const textDiv = existingDiv.querySelector('.text');
                    if (textDiv && !data.deleted && data.text && !textDiv.classList.contains('deleted-message')) {
                        textDiv.innerHTML = escapeHtml(data.text);
                    }
                    return;
                }
                // полная перерисовка если удалено
                if (isDeleted) {
                    const existing = document.querySelector(`.message[data-key="${messageKey}"]`);
                    if (existing) {
                        const curUser = currentNick;
                        const isMyDel = (data.sender === curUser);
                        const newDiv = document.createElement('div');
                        newDiv.className = 'message';
                        if (isMyDel) newDiv.classList.add('my-message');
                        newDiv.setAttribute('data-key', messageKey);
                        newDiv.innerHTML = `
                            <div class="sender"><span class="sender-name">🗑️ ${escapeHtml(data.sender)}</span></div>
                            <div class="text deleted-message">[Сообщение удалено]</div>
                            <div class="time">${data.time}</div>
                        `;
                        existing.replaceWith(newDiv);
                    }
                }
            });
            
            messagesRef.on('child_removed', (snapshot) => {
                const key = snapshot.key;
                const el = document.querySelector(`.message[data-key="${key}"]`);
                if (el) el.remove();
            });
            
            // дополнительно слушаем изменения лайков
            messagesRef.on('child_changed', (snapshot) => {
                const data = snapshot.val();
                if (data && data.likes !== undefined) {
                    const key = snapshot.key;
                    const likes = data.likes || 0;
                    const likedBy = data.likedBy || {};
                    const userLiked = !!likedBy[currentNick];
                    updateLikeUI(key, likes, userLiked);
                }
            });
        }
        
        // Отправка сообщения
        function sendMessage() {
            const sender = currentNick;
            const text = messageInput.value.trim();
            if (text === '') {
                messageInput.style.border = '2px solid #ff3300';
                setTimeout(() => messageInput.style.border = '1px solid #333', 800);
                return;
            }
            const message = {
                sender: sender,
                text: text,
                time: getTime(),
                timestamp: Date.now(),
                deleted: false,
                likes: 0,
                likedBy: {}
            };
            messagesRef.push(message).then(() => {
                messageInput.value = '';
                messageInput.focus();
            }).catch((error) => {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `❌ ОШИБКА: ${error.message}`;
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            });
        }
        
        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        // Инициализация профиля и слушателей
        updateProfileUI();
        attachMessageListeners();
        
        // Вкладки переключения
        const chatPane = document.getElementById('chatPane');
        const profilePaneEl = document.getElementById('profilePane');
        const tabBtns = document.querySelectorAll('.tab-btn');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (tabId === 'chat') {
                    chatPane.classList.add('active-pane');
                    profilePaneEl.classList.remove('active-pane');
                    messageInput.focus();
                } else if (tabId === 'profile') {
                    profilePaneEl.classList.add('active-pane');
                    chatPane.classList.remove('active-pane');
                    updateProfileUI();
                }
            });
        });
        
        statusDiv.innerHTML = '🟢 ONLINE • СВП';
        messageInput.focus();
        
    } catch (error) {
        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = `💀 ОШИБКА: ${error.message}`;
        document.getElementById('status').innerHTML = '🔴 СБОЙ';
        console.error(error);
    }
</script>
</body>
</html>
