        /* ========= ТЁМНАЯ ТЕМА (DARK) ========= */

        body.theme-dark .user-name {

        body.theme-dark .delete-chat-btn {

        body.theme-dark .nickname-input {

        /* ========= СВЕТЛАЯ ТЕМА (LIGHT) ========= */
        body.theme-light {

        body.theme-light .tabs {

        body.theme-light .tab-btn {

        body.theme-light .tab-btn.active {

        body.theme-light .messages {

        body.theme-light .input-area {

        }
        body.theme-light .settings-card {
            background: #ffffff;

        body.theme-light .settings-card h3 {

        }

        }
        body.theme-light .search-area {

        }

        }
        body.theme-light .search-row button {

        }

        }

        }

            border-left: 3px solid #ff5e00;

            color: #ff5e00;
        }
        body.theme-light .no-chat-selected {
            color: #999;
        }

            background: #ffffff;
            border: 1px solid #ddd;
        }
        body.theme-light .search-result span {

        }

        }

        }

            background: #ff4444;
            color: #fff;
        }
        body.theme-light .nickname-input {
            background: #ffffff;
            border: 1px solid #ff5e00;
            color: #333;
        }
        body.theme-light .auth-card {
            background: #ffffff;
        }
        body.theme-light .auth-card h1 {
            color: #ff5e00;
        }
        body.theme-light .auth-card p {

        }
        body.theme-light .auth-card input {
            background: #f5f5f5;
            border: 1px solid #ddd;

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            transition: background 0.3s ease;
        }

        /* ========= ЭКРАН АВТОРИЗАЦИИ ========= */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .auth-screen.hidden {
            display: none;
        }
        .auth-card {
            border: 2px solid #ff5e00;
            border-radius: 40px;
            padding: 40px 30px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 94, 0, 0.3);
            transition: all 0.3s ease;
        }
        .auth-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .auth-card p {
            font-size: 12px;
            margin-bottom: 30px;
        }
        .auth-card input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 30px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            font-family: monospace;
            outline: none;
            transition: all 0.3s ease;
        }
        .auth-card button {
            width: 100%;
            padding: 14px;
            background: #ff5e00;
            border: none;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        .auth-card button:active {
            transform: scale(0.97);
        }
        .auth-card .register-link {
            margin-top: 20px;
            font-size: 12px;
        }
        .auth-card .register-link span {
            color: #ff5e00;
            cursor: pointer;
            text-decoration: underline;
        }
        .error-msg {
            color: #ff6a4b;
            font-size: 12px;
            margin-top: 15px;
        }
        .success-msg {
            color: #00cc66;
            font-size: 12px;
            margin-top: 15px;
        }

        .chat {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s ease;
        }

        .tabs {
            display: flex;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .tab-btn {
            flex: 1;
            border: none;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-pane {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-pane.active-pane {
            display: flex;
        }

        .header {
            padding: 10px 15px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-name {
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .search-area {
            padding: 10px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .search-row {
            display: flex;
            gap: 8px;
        }
        .search-row input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 25px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-row button {
            border: none;
            border-radius: 25px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .search-row button:active {
            transform: scale(0.97);
        }

        .search-result {
            margin-top: 8px;
            padding: 8px;
            border-radius: 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .search-result.show {
            display: flex;
        }
        .search-result span {
            font-size: 13px;
        }
        .start-chat-btn {
            background: #ff5e00;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
        }
        .start-chat-btn:active {
            transform: scale(0.97);
        }

        .chats-list {
            border-bottom: 1px solid;
            max-height: 150px;
            overflow-y: auto;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .chat-tab {
            padding: 10px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .chat-tab-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .chat-tab-name {
            font-size: 14px;
        }
        .chat-tab-unread {
            background: #ff5e00;
            color: #000;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: bold;
        }
        .delete-chat-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
            opacity: 0.6;
        }
        .delete-chat-btn:active {
            opacity: 1;
        }

        .messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .no-chat-selected {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: none;
            transition: background 0.3s ease;
        }
        .messages.active {
            display: block;
        }
        .message {
            padding: 8px 12px;
            border-radius: 18px;
            margin-bottom: 8px;
            max-width: 80%;
            word-wrap: break-word;
            transition: all 0.3s ease;
        }
        .my-message {
            margin-left: auto;
        }
        .message-sender {
            font-size: 10px;
            margin-bottom: 3px;
        }
        .message-text {
            font-size: 13px;
        }
        .message-time {
            font-size: 8px;
            text-align: right;
            margin-top: 3px;
        }

        .input-area {
            padding: 8px 10px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .input-area button {
            border: none;
            border-radius: 25px;
            padding: 10px 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .input-area button:active {
            transform: scale(0.97);
        }

        .status {
            padding: 4px 10px;
            text-align: center;
            font-size: 10px;
            font-family: monospace;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        /* ========= НАСТРОЙКИ ========= */
        .settings-pane {
            padding: 20px 16px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .settings-card {
            border-radius: 28px;
            padding: 20px 16px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .settings-card h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }
        .settings-btn {
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .settings-btn:active {
            transform: scale(0.97);
        }
        .theme-icon {
            font-size: 20px;
        }
        .nickname-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
            outline: none;
        }
        
        @media (max-width: 500px) {
            .message {
                max-width: 85%;
            }
            .chats-list {
                max-height: 120px;
            }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body class="theme-dark">

<!-- ЭКРАН АВТОРИЗАЦИИ (ЛОГИН + ПАРОЛЬ) -->
<div class="auth-screen" id="authScreen">
    <div class="auth-card">
        <h1>💬 SVP</h1>
        <p>Войдите в свой аккаунт</p>
        <input type="text" id="loginUsername" placeholder="Логин (никнейм)" maxlength="20">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="loginBtn">ВОЙТИ</button>
        <div class="register-link">
            Нет аккаунта? <span id="showRegisterBtn">Зарегистрироваться</span>
        </div>
        <div id="authMessage" class="error-msg"></div>
    </div>
</div>

<!-- ЭКРАН РЕГИСТРАЦИИ -->
<div class="auth-screen" id="registerScreen" style="display: none;">
    <div class="auth-card">
        <h1>💬 SVP</h1>
        <p>Создайте новый аккаунт</p>
        <input type="text" id="regUsername" placeholder="Логин (никнейм)" maxlength="20">
        <input type="password" id="regPassword" placeholder="Пароль">
        <input type="password" id="regPasswordConfirm" placeholder="Подтвердите пароль">
        <button id="registerBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
        <div class="register-link">
            Уже есть аккаунт? <span id="showLoginBtn">Войти</span>
        </div>
        <div id="regMessage" class="error-msg"></div>
    </div>
</div>

<!-- ОСНОВНОЙ ЧАТ -->
<div class="chat" id="mainChat" style="display: none;">
    <div class="header">
        <div class="user-info">
            <span class="user-name" id="currentUserName">👤 <span id="userNameText">User</span> ✏️</span>
        </div>
    </div>
    
    <div class="status" id="status">
        <span>🔌 подключение...</span>
    </div>
    
    <!-- ВКЛАДКИ -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="chat" id="tabChatBtn">💬 ЧАТЫ</button>
        <button class="tab-btn" data-tab="settings" id="tabSettingsBtn">⚙️ НАСТРОЙКИ</button>
    </div>

    <div class="tab-content">
        <!-- ВКЛАДКА ЧАТОВ -->
        <div class="tab-pane active-pane" id="chatPane">
            <div class="search-area">
                <div class="search-row">
                    <input type="text" id="searchInput" placeholder="Поиск по никнейму...">
                    <button id="searchBtn">🔍 Найти</button>
                </div>
                <div class="search-result" id="searchResult">
                    <span id="searchUserName"></span>
                    <button class="start-chat-btn" id="startChatBtn">💬 Написать</button>
                </div>
            </div>
            
            <div class="chats-list" id="chatsList">
                <div style="padding: 10px; text-align: center; font-size: 11px; opacity: 0.7;">⬇️ Ваши диалоги ⬇️</div>
                <div id="chatsContainer"></div>
            </div>
            
            <div class="messages-area">
                <div id="noChatSelected" class="no-chat-selected">
                    👈 Выберите чат или найдите пользователя
                </div>
                <div id="messagesContainer" class="messages"></div>
            </div>
            
            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button id="sendBtn">➤</button>
                </div>
            </div>
        </div>
        
        <!-- ВКЛАДКА НАСТРОЕК -->
        <div class="tab-pane" id="settingsPane">
            <div class="settings-pane">
                <div class="settings-card">
                    <h3>👤 СМЕНИТЬ НИКНЕЙМ</h3>
                    <input type="text" id="newNicknameInput" class="nickname-input" placeholder="Новый никнейм" maxlength="20">
                    <button class="settings-btn" id="changeNicknameBtn">
                        ✏️ СМЕНИТЬ НИКНЕЙМ
                    </button>
                </div>
                
                <div class="settings-card">
                    <h3>🔐 СМЕНИТЬ ПАРОЛЬ</h3>
                    <input type="password" id="newPasswordInput" class="nickname-input" placeholder="Новый пароль">
                    <button class="settings-btn" id="changePasswordBtn">
                        🔒 СМЕНИТЬ ПАРОЛЬ
                    </button>
                </div>
                
                <div class="settings-card">
                    <h3>👤 АККАУНТ</h3>

    // ========== FIREBASE КОНФИГ (ЗАМЕНИТЕ НА СВОИ ДАННЫЕ) ==========
    const firebaseConfig = {

    authDomain: "noco-83ff7.firebaseapp.com",

    messagingSenderId: "383521536951",
    appId: "1:383521536951:web:9c1a4b90a021db80d00632",
    measurementId: "G-EYEVMCSGMP"
    };
    
    if (firebaseConfig.apiKey === "ВАШ_API_KEY") {
        alert('⚠️ ОШИБКА: Настройте Firebase! Вставьте свои данные в firebaseConfig');

    firebase.initializeApp(firebaseConfig);

    let currentChatsListener = null;
    let messageElementsMap = new Map();
    let isInitialLoad = true;

    let currentTheme = localStorage.getItem('svpTheme') || 'dark';

    // ========== ФУНКЦИИ ТЕМЫ ==========
    function applyTheme(theme) {
        document.body.classList.remove('theme-dark', 'theme-light');
        document.body.classList.add(`theme-${theme}`);
        localStorage.setItem('svpTheme', theme);
        currentTheme = theme;
        
        if (theme === 'dark') {
            themeIconSpan.innerHTML = '🌙';
            themeTextSpan.innerHTML = 'ТЁМНАЯ ТЕМА';
        } else {
            themeIconSpan.innerHTML = '☀️';
            themeTextSpan.innerHTML = 'СВЕТЛАЯ ТЕМА';
        }
    }
    
    function toggleTheme() {
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        applyTheme(newTheme);
    }
    
    applyTheme(currentTheme);
    
    if (themeSettingsBtn) {
        themeSettingsBtn.onclick = toggleTheme;
    }
    
    // ========== ФУНКЦИЯ ХЕШИРОВАНИЯ ПАРОЛЯ (простая, для демо) ==========
    function hashPassword(password) {
        let hash = 0;
        for (let i = 0; i < password.length; i++) {
            const char = password.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString();
    }
    
    // ========== РЕГИСТРАЦИЯ ==========
    function register() {
        const username = regUsername.value.trim().toLowerCase();
        const password = regPassword.value;
        const passwordConfirm = regPasswordConfirm.value;
        
        if (!username || !password) {
            regMessage.textContent = 'Заполните все поля!';
            return;
        }
        if (username.length < 3) {
            regMessage.textContent = 'Логин должен быть не менее 3 символов';
            return;
        }
        if (password.length < 4) {
            regMessage.textContent = 'Пароль должен быть не менее 4 символов';
            return;
        }
        if (password !== passwordConfirm) {
            regMessage.textContent = 'Пароли не совпадают!';
            return;
        }
        
        const passwordHash = hashPassword(password);
        
        database.ref('users/' + username).once('value', (snapshot) => {
            if (snapshot.exists()) {
                regMessage.textContent = 'Пользователь с таким логином уже существует!';
                return;
            }
            
            database.ref('users/' + username).set({
                nickname: username,
                passwordHash: passwordHash,
                uid: username + '_' + Date.now(),
                lastSeen: Date.now(),
                online: false
            }).then(() => {
                regMessage.style.color = '#00cc66';
                regMessage.textContent = '✅ Регистрация успешна! Теперь войдите.';
                setTimeout(() => {
                    showLoginScreen();
                }, 1500);
            }).catch(err => {
                regMessage.textContent = 'Ошибка: ' + err.message;
            });
        });
    }
    
    // ========== ВХОД ==========
    function login() {
        const username = loginUsername.value.trim().toLowerCase();
        const password = loginPassword.value;
        
        if (!username || !password) {
            authMessage.textContent = 'Введите логин и пароль!';
            return;
        }
        
        const passwordHash = hashPassword(password);
        
        database.ref('users/' + username).once('value', (snapshot) => {
            if (!snapshot.exists()) {
                authMessage.textContent = 'Неверный логин или пароль!';
                return;
            }
            
            const userData = snapshot.val();
            if (userData.passwordHash !== passwordHash) {
                authMessage.textContent = 'Неверный логин или пароль!';
                return;
            }
            
            currentUser = {
                nickname: username,
                uid: userData.uid || username,
                passwordHash: passwordHash
            };
            
            localStorage.setItem('svpUser', JSON.stringify(currentUser));
            localStorage.setItem('svpPasswordHash', passwordHash);
            
            authScreen.classList.add('hidden');
            registerScreen.style.display = 'none';
            mainChat.style.display = 'flex';
            userNameText.textContent = currentUser.nickname;
            statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname;
            
            database.ref('users/' + currentUser.nickname + '/online').set(true);
            database.ref('users/' + currentUser.nickname + '/lastSeen').set(Date.now());
            
            loadUserChats();
            
            database.ref('users/' + currentUser.nickname).onDisconnect().update({
                online: false,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
        });
    }
    
    // ========== ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ ==========
    function showRegisterScreen() {
        authScreen.classList.add('hidden');
        registerScreen.style.display = 'flex';
        authMessage.textContent = '';
        regMessage.textContent = '';
        regUsername.value = '';
        regPassword.value = '';
        regPasswordConfirm.value = '';
    }
    
    function showLoginScreen() {
        registerScreen.style.display = 'none';
        authScreen.classList.remove('hidden');
        authMessage.textContent = '';
        regMessage.textContent = '';
        loginUsername.value = '';
        loginPassword.value = '';
    }
    
    // ========== ВЫХОД ==========
    function logout() {
        if (currentUser) {
            database.ref('users/' + currentUser.nickname + '/online').set(false);
            database.ref('users/' + currentUser.nickname + '/lastSeen').set(firebase.database.ServerValue.TIMESTAMP);
        }
        
        detachMessagesListener();
        detachChatsListener();
        
        localStorage.removeItem('svpUser');
        localStorage.removeItem('svpPasswordHash');
        currentUser = null;
        currentChatWith = null;
        
        mainChat.style.display = 'none';
        authScreen.classList.remove('hidden');
        registerScreen.style.display = 'none';
        loginUsername.value = '';
        loginPassword.value = '';
        authMessage.textContent = '';
        
        chatsContainer.innerHTML = '';
        clearMessages();
        messagesContainer.classList.remove('active');
        noChatSelected.style.display = 'flex';
        inputArea.style.display = 'none';
        currentChatWith = null;
        
        if (chatPane) chatPane.classList.add('active-pane');
        if (settingsPane) settingsPane.classList.remove('active-pane');
        if (tabChatBtn) tabChatBtn.classList.add('active');
        if (tabSettingsBtn) tabSettingsBtn.classList.remove('active');
    }
    
    // ========== СМЕНА ПАРОЛЯ ==========
    function changePassword() {
        const newPassword = newPasswordInput.value.trim();
        if (!newPassword) {
            statusSpan.innerHTML = '⚠️ Введите новый пароль';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
            return;
        }
        if (newPassword.length < 4) {
            statusSpan.innerHTML = '⚠️ Пароль должен быть не менее 4 символов';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
            return;
        }
        
        const newPasswordHash = hashPassword(newPassword);
        
        database.ref('users/' + currentUser.nickname + '/passwordHash').set(newPasswordHash).then(() => {
            currentUser.passwordHash = newPasswordHash;
            localStorage.setItem('svpPasswordHash', newPasswordHash);
            statusSpan.innerHTML = '✅ Пароль успешно изменён!';
            newPasswordInput.value = '';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 3000);
        }).catch(err => {
            statusSpan.innerHTML = '❌ Ошибка: ' + err.message;
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 3000);
        });
    }
    
    if (changePasswordBtn) {
        changePasswordBtn.onclick = changePassword;
    }
    
    // ========== ФУНКЦИЯ СМЕНЫ НИКНЕЙМА ==========
    function changeNickname() {
        let newNickname = newNicknameInput.value.trim().toLowerCase();
        if (newNickname === "") {
            statusSpan.innerHTML = '⚠️ Введите новый никнейм';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
            return;
        }
        if (newNickname.length > 20) newNickname = newNickname.slice(0, 18);
        if (newNickname.length < 3) {
            statusSpan.innerHTML = '⚠️ Никнейм должен быть не менее 3 символов';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
            return;
        }
        if (newNickname === currentUser.nickname) {
            statusSpan.innerHTML = '⚠️ Это ваш текущий никнейм';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
            return;
        }
        
        database.ref('users/' + newNickname).once('value', (snapshot) => {
            if (snapshot.exists()) {
                statusSpan.innerHTML = '⚠️ Никнейм уже занят';
                setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
                return;
            }
            
            const oldNickname = currentUser.nickname;
            const passwordHash = currentUser.passwordHash;
            
            database.ref('users/' + newNickname).set({
                nickname: newNickname,
                passwordHash: passwordHash,
                uid: currentUser.uid,
                online: true,
                lastSeen: Date.now()
            });
            
            database.ref('userChats/' + oldNickname).once('value', (snapshot) => {
                const chats = snapshot.val();
                if (chats) {
                    Object.keys(chats).forEach(chatWith => {
                        database.ref('userChats/' + newNickname + '/' + chatWith).set(chats[chatWith]);
                        database.ref('userChats/' + chatWith + '/' + newNickname).set(chats[chatWith]);
                        database.ref('userChats/' + chatWith + '/' + oldNickname).remove();
                    });
                }
                database.ref('userChats/' + oldNickname).remove();
            });
            
            setTimeout(() => {
                currentUser.nickname = newNickname;
                localStorage.setItem('svpUser', JSON.stringify(currentUser));
                userNameText.textContent = currentUser.nickname;
                statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname;
                newNicknameInput.value = '';
                
                detachMessagesListener();
                detachChatsListener();
                currentChatWith = null;
                clearMessages();
                messagesContainer.classList.remove('active');
                noChatSelected.style.display = 'flex';
                inputArea.style.display = 'none';
                loadUserChats();
                
                database.ref('users/' + oldNickname).remove();
                
                statusSpan.innerHTML = '✅ Никнейм изменён на ' + newNickname;
                setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 3000);
            }, 1000);
        });
    }
    
    if (changeNicknameBtn) {
        changeNicknameBtn.onclick = changeNickname;

    window.showChangeNicknameDialog = function() {

    // ========== ФУНКЦИЯ УДАЛЕНИЯ ЧАТА ==========
    function deleteChat(chatWithUser) {
        if (!confirm(`Удалить чат с ${chatWithUser}? Все сообщения будут удалены безвозвратно.`)) {
            return;
        }
        
        const chatId = getChatId(currentUser.nickname, chatWithUser);
        
        database.ref('messages/' + chatId).remove();
        database.ref('userChats/' + currentUser.nickname + '/' + chatWithUser).remove();
        database.ref('userChats/' + chatWithUser + '/' + currentUser.nickname).remove();
        
        if (currentChatWith === chatWithUser) {
            currentChatWith = null;
            clearMessages();
            messagesContainer.classList.remove('active');
            noChatSelected.style.display = 'flex';
            inputArea.style.display = 'none';
        }
        
        statusSpan.innerHTML = '🗑️ Чат удалён';
        setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
    }
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function getTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function getChatId(user1, user2) {
        return [user1, user2].sort().join('_');
    }
    
    function detachMessagesListener() {
        if (currentMessagesListener && currentMessagesRef) {
            currentMessagesRef.off('child_added', currentMessagesListener);
            currentMessagesListener = null;
            currentMessagesRef = null;
        }
        messageElementsMap.clear();
    }
    
    function detachChatsListener() {
        if (currentChatsListener && currentUser) {
            const userChatsRef = database.ref('userChats/' + currentUser.nickname);
            userChatsRef.off('value', currentChatsListener);
            currentChatsListener = null;
        }
    }
    
    function clearMessages() {
        messagesContainer.innerHTML = '';
        messageElementsMap.clear();
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
    }
    
    function addMessageToDOM(msg, msgKey) {
        if (messageElementsMap.has(msgKey)) return;
        
        const isMy = (msg.sender === currentUser.nickname);
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message' + (isMy ? ' my-message' : '');
        messageDiv.setAttribute('data-key', msgKey);
        messageDiv.innerHTML = `
            ${!isMy ? `<div class="message-sender">${escapeHtml(msg.sender)}</div>` : ''}
            <div class="message-text">${escapeHtml(msg.text)}</div>
            <div class="message-time">${msg.time}</div>
        `;
        
        let inserted = false;
        const existingMessages = messagesContainer.querySelectorAll('.message');
        
        for (let i = 0; i < existingMessages.length; i++) {
            const existingKey = existingMessages[i].getAttribute('data-key');
            if (existingKey && msgKey < existingKey) {
                messagesContainer.insertBefore(messageDiv, existingMessages[i]);
                inserted = true;
                break;
            }
        }
        
        if (!inserted) {
            messagesContainer.appendChild(messageDiv);
        }
        
        messageElementsMap.set(msgKey, messageDiv);
        return messageDiv;
    }
    
    // ========== ПРОВЕРКА СОХРАНЁННОГО ПОЛЬЗОВАТЕЛЯ ==========
    const savedUser = localStorage.getItem('svpUser');
    const savedPasswordHash = localStorage.getItem('svpPasswordHash');
    
    if (savedUser && savedPasswordHash) {
        try {
            const user = JSON.parse(savedUser);
            database.ref('users/' + user.nickname).once('value', (snapshot) => {
                if (snapshot.exists() && snapshot.val().passwordHash === savedPasswordHash) {
                    currentUser = user;
                    authScreen.classList.add('hidden');
                    registerScreen.style.display = 'none';
                    mainChat.style.display = 'flex';
                    userNameText.textContent = currentUser.nickname;
                    statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname;
                    database.ref('users/' + currentUser.nickname + '/online').set(true);
                    loadUserChats();
                    database.ref('users/' + currentUser.nickname).onDisconnect().update({
                        online: false,
                        lastSeen: firebase.database.ServerValue.TIMESTAMP
                    });
                } else {
                    logout();
                }
            });
        } catch(e) {
            logout();
        }
    }
    
    // ========== НАВЕШИВАНИЕ ОБРАБОТЧИКОВ ==========
    if (loginBtn) loginBtn.onclick = login;
    if (showRegisterBtn) showRegisterBtn.onclick = showRegisterScreen;
    if (showLoginBtn) showLoginBtn.onclick = showLoginScreen;
    if (registerBtn) registerBtn.onclick = register;
    if (logoutSettingsBtn) logoutSettingsBtn.onclick = logout;
    
    loginUsername.onkeypress = (e) => { if (e.key === 'Enter') login(); };
    loginPassword.onkeypress = (e) => { if (e.key === 'Enter') login(); };
    regUsername.onkeypress = (e) => { if (e.key === 'Enter') register(); };
    regPassword.onkeypress = (e) => { if (e.key === 'Enter') register(); };
    regPasswordConfirm.onkeypress = (e) => { if (e.key === 'Enter') register(); };
    
    // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
    function switchTab(tabId) {
        if (tabId === 'chat') {
            chatPane.classList.add('active-pane');
            settingsPane.classList.remove('active-pane');
            tabChatBtn.classList.add('active');
            tabSettingsBtn.classList.remove('active');
            if (document.activeElement === messageInput) {
                messageInput.blur();
            }
        } else {
            settingsPane.classList.add('active-pane');
            chatPane.classList.remove('active-pane');
            tabSettingsBtn.classList.add('active');
            tabChatBtn.classList.remove('active');
        }
    }
    
    if (tabChatBtn) tabChatBtn.onclick = () => switchTab('chat');
    if (tabSettingsBtn) tabSettingsBtn.onclick = () => switchTab('settings');
    
    // ========== ПОИСК ПОЛЬЗОВАТЕЛЕЙ ==========
    searchBtn.onclick = () => {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) return;
        
        database.ref('users').once('value', (snapshot) => {
            let found = null;
            snapshot.forEach((child) => {
                const userData = child.val();
                if (userData.nickname && userData.nickname.toLowerCase() === query) {
                    found = userData;
                }
            });
            
            if (found && found.nickname !== currentUser.nickname) {
                searchUserName.textContent = found.nickname;
                searchResult.classList.add('show');
                startChatBtn.onclick = () => {
                    openChatWith(found.nickname);
                    searchResult.classList.remove('show');
                    searchInput.value = '';
                    switchTab('chat');
                };
            } else if (found && found.nickname === currentUser.nickname) {
                searchUserName.textContent = '❌ Это вы сами';
                searchResult.classList.add('show');
                setTimeout(() => searchResult.classList.remove('show'), 2000);
            } else {
                searchUserName.textContent = '❌ Пользователь не найден';
                searchResult.classList.add('show');
                setTimeout(() => searchResult.classList.remove('show'), 2000);
            }
        });
    };
    
    // ========== ОТКРЫТИЕ ЧАТА ==========
    function openChatWith(otherUser) {
        if (otherUser === currentUser.nickname) {
            statusSpan.innerHTML = '⚠️ Нельзя писать самому себе';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
            return;
        }
        
        detachMessagesListener();
        
        currentChatWith = otherUser;
        
        noChatSelected.style.display = 'none';
        messagesContainer.classList.add('active');
        inputArea.style.display = 'block';
        
        clearMessages();
        
        document.querySelectorAll('.chat-tab').forEach(tab => {
            const user = tab.getAttribute('data-user');
            if (user === otherUser) {
                tab.classList.add('active');
                const unreadSpan = tab.querySelector('.chat-tab-unread');
                if (unreadSpan) unreadSpan.remove();
            } else {
                tab.classList.remove('active');
            }
        });
        
        database.ref('userChats/' + currentUser.nickname + '/' + otherUser + '/unread').set(0);
        
        loadMessages(otherUser);
    }
    
    // ========== ЗАГРУЗКА СООБЩЕНИЙ ==========
    function loadMessages(withUser) {
        const chatId = getChatId(currentUser.nickname, withUser);
        currentMessagesRef = database.ref('messages/' + chatId);
        
        isInitialLoad = true;
        
        currentMessagesRef.limitToLast(50).once('value', (snapshot) => {
            const messages = [];
            snapshot.forEach((childSnapshot) => {
                messages.push({
                    key: childSnapshot.key,
                    ...childSnapshot.val()
                });
            });
            messages.sort((a, b) => {
                if (a.key < b.key) return -1;
                if (a.key > b.key) return 1;
                return 0;
            });
            
            messages.forEach(msg => {
                addMessageToDOM(msg, msg.key);
            });
            
            isInitialLoad = false;
            scrollToBottom();
        });
        
        currentMessagesListener = currentMessagesRef.on('child_added', (snapshot) => {
            const msg = snapshot.val();
            const msgKey = snapshot.key;
            
            if (messageElementsMap.has(msgKey)) return;
            
            addMessageToDOM(msg, msgKey);
            
            if (msg.sender !== currentUser.nickname && currentChatWith === withUser && !isInitialLoad) {
                database.ref('userChats/' + currentUser.nickname + '/' + withUser + '/unread').set(0);
                playNotificationSound();
            }
            
            if (!isInitialLoad) {
                scrollToBottom();
            }
        });
    }
    
    function playNotificationSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.1;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            oscillator.stop(audioCtx.currentTime + 0.3);
            if (audioCtx.state === 'suspended') audioCtx.resume();
        } catch(e) {}
    }
    
    // ========== ЗАГРУЗКА СПИСКА ЧАТОВ ==========
    function loadUserChats() {
        detachChatsListener();
        
        const userChatsRef = database.ref('userChats/' + currentUser.nickname);
        
        currentChatsListener = userChatsRef.on('value', (snapshot) => {
            const chats = [];
            snapshot.forEach((child) => {
                const data = child.val();
                chats.push({
                    withUser: child.key,
                    lastMessage: data.lastMessage || '',
                    lastTime: data.lastTime || 0,
                    unread: data.unread || 0
                });
            });
            
            chats.sort((a, b) => (b.lastTime || 0) - (a.lastTime || 0));
            
            if (chats.length === 0) {
                chatsContainer.innerHTML = '<div style="padding: 10px; text-align: center; opacity: 0.7; font-size: 11px;">😔 Нет диалогов<br>Найдите пользователя в поиске</div>';
                return;
            }
            
            chatsContainer.innerHTML = chats.map(chat => `
                <div class="chat-tab ${currentChatWith === chat.withUser ? 'active' : ''}" data-user="${chat.withUser}">
                    <div class="chat-tab-left" onclick="event.stopPropagation(); openChatWith('${chat.withUser}')">
                        <span class="chat-tab-name">💬 ${escapeHtml(chat.withUser)}</span>
                        ${chat.unread > 0 ? `<span class="chat-tab-unread">${chat.unread}</span>` : ''}
                    </div>
                    <button class="delete-chat-btn" onclick="event.stopPropagation(); deleteChat('${chat.withUser}')">🗑️</button>
                </div>
            `).join('');
        });
    }
    
    // ========== ОТПРАВКА СООБЩЕНИЯ ==========
    function sendMessage() {
        if (!currentChatWith) {
            statusSpan.innerHTML = '⚠️ Выберите чат';
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 1500);
            return;
        }
        
        const text = messageInput.value.trim();
        if (text === '') return;
        
        const chatId = getChatId(currentUser.nickname, currentChatWith);
        
        const message = {
            sender: currentUser.nickname,
            receiver: currentChatWith,
            text: text,
            time: getTime(),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        
        messageInput.value = '';
        
        database.ref('messages/' + chatId).push(message).then((newMsgRef) => {
            const updateData = {
                lastMessage: text.length > 30 ? text.slice(0, 27) + '...' : text,
                lastTime: firebase.database.ServerValue.TIMESTAMP
            };
            
            database.ref('userChats/' + currentUser.nickname + '/' + currentChatWith).update({
                ...updateData,
                unread: 0
            });
            
            database.ref('userChats/' + currentChatWith + '/' + currentUser.nickname).update({
                ...updateData,
                unread: firebase.database.ServerValue.increment(1)
            });
        }).catch(err => {
            statusSpan.innerHTML = '❌ Ошибка: ' + err.message;
            setTimeout(() => statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname, 2000);
            messageInput.value = text;
        });
    }
    
    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    
    // ========== СТАТУС ОНЛАЙН ==========
    database.ref('.info/connected').on('value', (snap) => {
        if (snap.val() === true && currentUser) {
            statusSpan.innerHTML = '🟢 ONLINE • ' + currentUser.nickname;
            if (currentUser) {
                database.ref('users/' + currentUser.nickname + '/online').set(true);
            }
        } else if (currentUser) {
            statusSpan.innerHTML = '🔴 OFFLINE • ' + currentUser.nickname;
        }
    });
    
    console.log('✅ Чат готов!');
</script>
</body>
</html>
