<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>СВП | МОБИЛЬНЫЙ ЧАТ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Courier New', monospace;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .chat {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            height: 100dvh;
            background: #000000;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(255, 94, 0, 0.3);
            position: relative;
        }

        .header {
            background: #050505;
            color: #ff8c00;
            padding: 12px 15px;
            text-align: center;
            border-bottom: 2px solid #ff5e00;
            box-shadow: 0 0 12px rgba(255, 94, 0, 0.4);
            flex-shrink: 0;
        }

        .header h3 {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 3px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px;
            background: #0b0b0b;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .messages::-webkit-scrollbar {
            width: 3px;
        }
        .messages::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #ff5e00;
            border-radius: 10px;
        }

        .message {
            background: #111111;
            padding: 8px 12px;
            border-radius: 18px;
            margin-bottom: 8px;
            max-width: 85%;
            border: 1px solid #2a2a2a;
            position: relative;
            word-wrap: break-word;
        }

        .my-message {
            background: #1f0a00;
            margin-left: auto;
            border: 1px solid #ff5e00;
            box-shadow: 0 0 6px rgba(255, 94, 0, 0.3);
        }

        .sender {
            font-size: 10px;
            font-weight: bold;
            color: #ff8c00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .sender-name {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff6a4b;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
            min-width: 36px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:active {
            opacity: 0.7;
            transform: scale(0.95);
        }

        .text {
            font-size: 14px;
            margin: 4px 0;
            color: #e0e0e0;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .time {
            font-size: 8px;
            color: #aa6f3c;
            text-align: right;
            font-family: monospace;
            margin-top: 4px;
        }

        /* Панель эмодзи - компактная */
        .emoji-panel {
            background: #0f0f0f;
            border-top: 1px solid #ff5e00;
            padding: 0 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            flex-shrink: 0;
        }

        .emoji-panel.open {
            max-height: 130px;
            padding: 10px 10px;
            overflow-y: auto;
        }

        .emoji-btn {
            background: #1a1a1a;
            border: 1px solid #ff5e00;
            color: #ffaa55;
            font-size: 22px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 35px;
            min-width: 42px;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-btn:active {
            background: #ff5e00;
            transform: scale(0.95);
        }

        /* КОМПАКТНАЯ НИЖНЯЯ ПАНЕЛЬ — ВСЕ КНОПКИ ВИДНЫ */
        .input-area {
            background: #050505;
            padding: 8px 10px;
            border-top: 1px solid #ff5e00;
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .input-area input {
            background: #111;
            border: 1px solid #333;
            color: #ffb347;
            padding: 10px 12px;
            border-radius: 25px;
            outline: none;
            font-family: monospace;
            font-size: 14px;
            -webkit-appearance: none;
        }

        .input-area input:focus {
            border-color: #ff5e00;
            box-shadow: 0 0 6px #ff5e00;
        }

        #nameInput {
            width: 70px;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            padding: 10px 5px;
        }

        #messageInput {
            flex: 1;
            font-size: 14px;
            min-width: 0;
        }

        .input-area button {
            background: #000;
            color: #ff8c00;
            border: 1.5px solid #ff5e00;
            border-radius: 35px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
            transition: 0.1s;
            min-width: 48px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
        }

        .input-area button:active {
            background: #ff5e00;
            color: #000;
            transform: scale(0.96);
        }

        #sendBtn {
            background: #1a0a00;
        }

        .emoji-toggle {
            background: #1a1a1a;
            font-size: 20px;
            padding: 0 12px;
        }

        .status {
            background: #0f0f0f;
            color: #ffaa55;
            padding: 4px;
            text-align: center;
            font-size: 9px;
            font-family: monospace;
            border-bottom: 1px dashed #ff5e00;
            flex-shrink: 0;
        }

        .error {
            background: #1a0000;
            color: #ff6a4b;
            padding: 8px;
            text-align: center;
            font-size: 10px;
            border-top: 1px solid #ff3c00;
            font-family: monospace;
            flex-shrink: 0;
        }

        .deleted-message {
            font-style: italic;
            color: #aa6f3c;
            text-align: center;
            font-size: 11px;
        }

        /* Для очень узких экранов */
        @media (max-width: 400px) {
            #nameInput {
                width: 60px;
                font-size: 11px;
                padding: 9px 4px;
            }
            .input-area button {
                min-width: 44px;
                padding: 0 8px;
                font-size: 14px;
            }
            .emoji-toggle {
                font-size: 18px;
            }
            #sendBtn {
                font-size: 14px;
            }
        }

        /* Для совсем маленьких (например, 320px) */
        @media (max-width: 360px) {
            .input-row {
                gap: 4px;
            }
            #nameInput {
                width: 55px;
            }
            .input-area button {
                min-width: 40px;
                padding: 0 6px;
            }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
<div class="chat">
    <div class="header">
        <h3>⚡ СВП ⚡</h3>
    </div>
    
    <div class="status" id="status">🔌 инициализация...</div>
    
    <div class="messages" id="messages"></div>
    
    <!-- Панель эмодзи -->
    <div class="emoji-panel" id="emojiPanel">
        <button class="emoji-btn">😀</button>
        <button class="emoji-btn">😂</button>
        <button class="emoji-btn">🔥</button>
        <button class="emoji-btn">❤️</button>
        <button class="emoji-btn">👍</button>
        <button class="emoji-btn">🎉</button>
        <button class="emoji-btn">😎</button>
        <button class="emoji-btn">💀</button>
        <button class="emoji-btn">✨</button>
        <button class="emoji-btn">🤣</button>
        <button class="emoji-btn">😍</button>
        <button class="emoji-btn">🥰</button>
        <button class="emoji-btn">😭</button>
        <button class="emoji-btn">😱</button>
        <button class="emoji-btn">🤖</button>
    </div>
    
    <!-- КОМПАКТНАЯ ПАНЕЛЬ — ВСЕ КНОПКИ В РЯД -->
    <div class="input-area">
        <div class="input-row">
            <input type="text" id="nameInput" placeholder="Имя" value="NeoUser" maxlength="20">
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button id="sendBtn">➤</button>
            <button id="emojiToggleBtn" class="emoji-toggle">😊</button>
        </div>
    </div>
    
    <div class="error" id="error" style="display: none;"></div>
</div>

<script>
    // ========== ⚠️ ВСТАВЬТЕ ВАШИ ДАННЫЕ FIREBASE ЗДЕСЬ ==========
    const firebaseConfig = {
    apiKey: "AIzaSyBRtSfBYUd5PHRjwnmhb5Mrj67F7KOKr1M",
    authDomain: "noco-83ff7.firebaseapp.com",
    databaseURL: "https://noco-83ff7-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "noco-83ff7",
    storageBucket: "noco-83ff7.firebasestorage.app",
    messagingSenderId: "383521536951",
    appId: "1:383521536951:web:9c1a4b90a021db80d00632",
    measurementId: "G-EYEVMCSGMP"
    };
    // ============================================================
    
    const isConfigEmpty = (firebaseConfig.apiKey === "ВАШ_API_KEY" || firebaseConfig.databaseURL.includes("ВАШ_ПРОЕКТ"));
    
    if (isConfigEmpty) {
        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = '⚠️ ОШИБКА: Firebase не настроен! Вставьте свои данные в firebaseConfig';
        document.getElementById('status').innerHTML = '❌ СБОЙ ПОДКЛЮЧЕНИЯ';
        throw new Error('Firebase конфиг отсутствует');
    }
    
    try {
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');
        
        const messagesDiv = document.getElementById('messages');
        const nameInput = document.getElementById('nameInput');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        const emojiPanel = document.getElementById('emojiPanel');
        const emojiToggleBtn = document.getElementById('emojiToggleBtn');
        
        // --- Панель эмодзи ---
        let emojiPanelOpen = false;
        emojiToggleBtn.onclick = () => {
            emojiPanelOpen = !emojiPanelOpen;
            if (emojiPanelOpen) {
                emojiPanel.classList.add('open');
                emojiToggleBtn.style.background = '#ff5e00';
                emojiToggleBtn.style.color = '#000';
            } else {
                emojiPanel.classList.remove('open');
                emojiToggleBtn.style.background = '#1a1a1a';
                emojiToggleBtn.style.color = '#ffaa55';
            }
        };
        
        // Добавление эмодзи в поле ввода
        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.onclick = () => {
                messageInput.value += btn.textContent;
                messageInput.focus();
            };
        });
        
        // Статус соединения
        database.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                statusDiv.innerHTML = '🟢 ONLINE • СВП | ТОЛЬКО СВОИ 💀';
                statusDiv.style.background = '#0a1a05';
                errorDiv.style.display = 'none';
            } else {
                statusDiv.innerHTML = '🔴 OFFLINE • ПОТЕРЯН КОНТАКТ';
                statusDiv.style.background = '#1a0505';
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '⚠️ НЕТ ПОДКЛЮЧЕНИЯ К FIREBASE ⚠️';
            }
        });
        
        function getTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Функция удаления сообщения (только для своих)
        function deleteMessage(messageKey, messageSender) {
            if (!messageKey) return;
            
            const currentUser = nameInput.value.trim() || 'NeoUser';
            
            if (messageSender !== currentUser) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '❌ НЕЛЬЗЯ УДАЛИТЬ ЧУЖОЕ СООБЩЕНИЕ ❌';
                setTimeout(() => errorDiv.style.display = 'none', 2000);
                return;
            }
            
            const confirmDelete = confirm(`💀 УДАЛИТЬ СВОЁ СООБЩЕНИЕ? 💀`);
            if (!confirmDelete) return;
            
            database.ref(`messages/${messageKey}`).remove()
                .then(() => {
                    console.log('Своё сообщение удалено');
                })
                .catch((error) => {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = `❌ Ошибка: ${error.message}`;
                    setTimeout(() => errorDiv.style.display = 'none', 2500);
                });
        }
        
        // Добавление сообщения
        function addMessage(sender, text, time, isMyMessage, messageKey, isDeleted = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            if (isMyMessage) messageDiv.classList.add('my-message');
            messageDiv.setAttribute('data-key', messageKey);
            
            if (isDeleted) {
                messageDiv.innerHTML = `
                    <div class="sender">
                        <span class="sender-name">🗑️ ${escapeHtml(sender)}</span>
                    </div>
                    <div class="text deleted-message">[Сообщение удалено]</div>
                    <div class="time">${time}</div>
                `;
            } else {
                const deleteButtonHtml = isMyMessage ? 
                    `<button class="delete-btn" data-key="${messageKey}" data-sender="${escapeHtml(sender)}">🗑️</button>` : '';
                
                messageDiv.innerHTML = `
                    <div class="sender">
                        <span class="sender-name">✨ ${escapeHtml(sender)}</span>
                        ${deleteButtonHtml}
                    </div>
                    <div class="text">${escapeHtml(text)}</div>
                    <div class="time">${time}</div>
                `;
                
                if (isMyMessage) {
                    const delBtn = messageDiv.querySelector('.delete-btn');
                    if (delBtn) {
                        delBtn.onclick = (e) => {
                            e.stopPropagation();
                            deleteMessage(messageKey, sender);
                        };
                    }
                }
            }
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Слушаем добавление сообщений
        messagesRef.limitToLast(50).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const messageKey = snapshot.key;
            if (!data) return;
            
            const currentName = nameInput.value.trim() || 'NeoUser';
            const isMy = (data.sender === currentName);
            const isDeleted = data.deleted === true;
            
            addMessage(data.sender, data.text, data.time, isMy, messageKey, isDeleted);
        });
        
        // Слушаем изменения
        messagesRef.on('child_changed', (snapshot) => {
            const data = snapshot.val();
            const messageKey = snapshot.key;
            if (!data) return;
            
            const existing = document.querySelector(`.message[data-key="${messageKey}"]`);
            if (existing) {
                const currentName = nameInput.value.trim() || 'NeoUser';
                const isMy = (data.sender === currentName);
                const newDiv = document.createElement('div');
                newDiv.className = 'message';
                if (isMy) newDiv.classList.add('my-message');
                newDiv.setAttribute('data-key', messageKey);
                
                if (data.deleted === true) {
                    newDiv.innerHTML = `
                        <div class="sender">
                            <span class="sender-name">🗑️ ${escapeHtml(data.sender)}</span>
                        </div>
                        <div class="text deleted-message">[Сообщение удалено]</div>
                        <div class="time">${data.time}</div>
                    `;
                } else {
                    const delHtml = isMy ? `<button class="delete-btn" data-key="${messageKey}">🗑️</button>` : '';
                    newDiv.innerHTML = `
                        <div class="sender">
                            <span class="sender-name">✨ ${escapeHtml(data.sender)}</span>
                            ${delHtml}
                        </div>
                        <div class="text">${escapeHtml(data.text)}</div>
                        <div class="time">${data.time}</div>
                    `;
                    if (isMy) {
                        const btn = newDiv.querySelector('.delete-btn');
                        if (btn) btn.onclick = (e) => {
                            e.stopPropagation();
                            deleteMessage(messageKey, data.sender);
                        };
                    }
                }
                existing.replaceWith(newDiv);
            }
        });
        
        // Удаление сообщения из DOM
        messagesRef.on('child_removed', (snapshot) => {
            const key = snapshot.key;
            const el = document.querySelector(`.message[data-key="${key}"]`);
            if (el) el.remove();
        });
        
        // Отправка
        function sendMessage() {
            let sender = nameInput.value.trim();
            if (sender === '') {
                sender = 'NeoUser';
                nameInput.value = 'NeoUser';
            }
            if (sender.length > 20) sender = sender.slice(0, 18) + '..';
            
            const text = messageInput.value.trim();
            if (text === '') {
                messageInput.style.border = '2px solid #ff3300';
                setTimeout(() => messageInput.style.border = '1px solid #333', 800);
                return;
            }
            
            const message = {
                sender: sender,
                text: text,
                time: getTime(),
                timestamp: Date.now(),
                deleted: false
            };
            
            messagesRef.push(message).then(() => {
                messageInput.value = '';
                messageInput.focus();
            }).catch((error) => {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `❌ ОШИБКА: ${error.message}`;
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            });
        }
        
        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        // Сохранение имени
        const savedName = localStorage.getItem('svpChatName');
        if (savedName) nameInput.value = savedName;
        nameInput.onchange = () => {
            let newName = nameInput.value.trim();
            if (newName === '') newName = 'NeoUser';
            if (newName.length > 20) newName = newName.slice(0, 18) + '..';
            nameInput.value = newName;
            localStorage.setItem('svpChatName', newName);
            
            // Обновляем сообщения
            messagesRef.off();
            messagesDiv.innerHTML = '';
            messagesRef.limitToLast(50).on('child_added', (snapshot) => {
                const data = snapshot.val();
                const key = snapshot.key;
                if (!data) return;
                const curName = nameInput.value.trim() || 'NeoUser';
                addMessage(data.sender, data.text, data.time, data.sender === curName, key, data.deleted === true);
            });
        };
        
        statusDiv.innerHTML = '🟢 СВП | СВОИ СООБЩЕНИЯ 🔒';
        messageInput.focus();
        
    } catch (error) {
        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = `💀 ОШИБКА: ${error.message}`;
        document.getElementById('status').innerHTML = '🔴 СБОЙ';
        console.error(error);
    }
</script>
</body>
</html>
